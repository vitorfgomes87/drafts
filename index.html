<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Endereço</title>

  <!-- Fonte Varela via Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Varela:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Varela', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      max-width: 600px;
      margin: 20px auto;
    }
    label { 
      display: block; 
      margin-top: 10px; 
      font-weight: 500; 
    }
    input { 
      width: 100%; 
      padding: 6px; 
      box-sizing: border-box;
      font-size: 16px;
    }
    .linha { display: flex; gap: 10px; }
    .linha > div { flex: 1; }
  </style>

  <script>
    function limpaFormularioCep() {
      document.getElementById('logradouro').value = "";
      document.getElementById('bairro').value = "";
      document.getElementById('cidade').value = "";
    }

    function meu_callback(conteudo) {
      if (!("erro" in conteudo)) {
        document.getElementById('logradouro').value = conteudo.logradouro;
        document.getElementById('bairro').value = conteudo.bairro;
        document.getElementById('cidade').value = conteudo.localidade;
      } else {
        limpaFormularioCep();
        alert("CEP não encontrado.");
      }
    }

    function pesquisacep(valor) {
      var cep = valor.replace(/\D/g, '');

      if (cep != "") {
        var validacep = /^[0-9]{8}$/;

        if (validacep.test(cep)) {
          document.getElementById('logradouro').value = "...";
          document.getElementById('bairro').value = "...";
          document.getElementById('cidade').value = "...";

          var script = document.createElement('script');
          script.src = 'https://viacep.com.br/ws/' + cep + '/json/?callback=meu_callback';
          document.body.appendChild(script);
        } else {
          limpaFormularioCep();
          alert("Formato de CEP inválido.");
        }
      } else {
        limpaFormularioCep();
      }
    }
  </script>
</head>
<body>

  <h2>Endereço</h2>

  <form method="post" action="#">
    <label>CEP:
      <input type="text" name="cep" id="cep" maxlength="9"
             placeholder="00000-000"
             onblur="pesquisacep(this.value);" required>
    </label>

    <label>Logradouro:
      <input type="text" name="logradouro" id="logradouro">
    </label>

    <div class="linha">
      <div>
        <label>Nº:
          <input type="text" name="numero" id="numero">
        </label>
      </div>
      <div>
        <label>Bairro:
          <input type="text" name="bairro" id="bairro">
        </label>
      </div>
    </div>

    <label>Complemento:
      <input type="text" name="complemento" id="complemento">
    </label>

    <label>Cidade:
      <input type="text" name="cidade" id="cidade">
    </label>

    <button type="submit" style="margin-top: 15px;">Enviar</button>
  </form>

</body>
</html>
